# =============================================================================
# Panopticon — Production base compose
# Override with docker-compose.dev.yml for development (volume mounts, hot-reload)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: panopticon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panopticon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panopticon}
      POSTGRES_DB: ${POSTGRES_DB:-panopticon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panopticon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - panopticon

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: panopticon-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-panopticon}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_PORT:-8123}:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - panopticon

  redis:
    image: redis:7-alpine
    container_name: panopticon-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - panopticon

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: panopticon-api
    ports:
      - "${API_PORT:-4400}:4400"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "4400"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-panopticon}:${POSTGRES_PASSWORD:-panopticon}@postgres:5432/${POSTGRES_DB:-panopticon}"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DB: "${CLICKHOUSE_DB:-panopticon}"
      REDIS_URL: "redis://redis:6379"
      LLM_PROVIDER: "${LLM_PROVIDER:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      JWT_SECRET: "${JWT_SECRET:-panopticon-dev-secret-change-in-production}"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panopticon

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: panopticon-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      INTERNAL_API_URL: "http://api:4400"
    depends_on:
      - api
    networks:
      - panopticon

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: panopticon-worker
    command: ["bun", "run", "src/workers/index.ts"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-panopticon}:${POSTGRES_PASSWORD:-panopticon}@postgres:5432/${POSTGRES_DB:-panopticon}"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DB: "${CLICKHOUSE_DB:-panopticon}"
      REDIS_URL: "redis://redis:6379"
      LLM_PROVIDER: "${LLM_PROVIDER:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panopticon

volumes:
  pgdata:
  chdata:
  redisdata:

networks:
  panopticon:
    driver: bridge
