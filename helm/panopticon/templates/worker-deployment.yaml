apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "panopticon.fullname" . }}-worker
  labels:
    {{- include "panopticon.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "panopticon.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "panopticon.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          env:
            - name: POSTGRES_URL
              value: "postgres://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password }}@{{ include "panopticon.fullname" . }}-postgresql:5432/{{ .Values.postgres.auth.database }}"
            - name: CLICKHOUSE_URL
              value: "http://{{ include "panopticon.fullname" . }}-clickhouse:8123"
            - name: REDIS_URL
              value: "redis://{{ include "panopticon.fullname" . }}-redis-master:6379"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
