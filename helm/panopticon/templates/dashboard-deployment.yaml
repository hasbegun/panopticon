apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "panopticon.fullname" . }}-dashboard
  labels:
    {{- include "panopticon.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "panopticon.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "panopticon.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          env:
            - name: INTERNAL_API_URL
              value: "http://{{ include "panopticon.fullname" . }}-api:{{ .Values.api.port }}"
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "panopticon.fullname" . }}-dashboard
  labels:
    {{- include "panopticon.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.dashboard.port }}
      targetPort: {{ .Values.dashboard.port }}
      protocol: TCP
  selector:
    {{- include "panopticon.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
